<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><title>Walk-Forward CV</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#060c14;overflow:hidden}
#world{position:fixed;left:0;top:0;width:1400px;height:800px;transform-origin:0 0}
svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
</style>
</head>
<body>
<div id="world"><svg id="sv" viewBox="0 0 1400 800"></svg></div>
<script>
const NS='http://www.w3.org/2000/svg';
const sv=document.getElementById('sv');
function scaleWorld(){
  const s=Math.min(window.innerWidth/1400,window.innerHeight/800);
  const x=(window.innerWidth-1400*s)/2,y=(window.innerHeight-800*s)/2;
  document.getElementById('world').style.transform=`translate(${x}px,${y}px) scale(${s})`;
}
scaleWorld();window.addEventListener('resize',scaleWorld);
function mk(tag,a,p){const el=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(a||{}))el.setAttribute(k,v);(p||sv).appendChild(el);return el;}
function tx(content,a,p){const el=mk('text',a,p);el.textContent=content;return el;}
function lerp(a,b,t){return a+(b-a)*t}
function eOut(t){return 1-Math.pow(1-t,3)}
function eInOut(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}
function fadeIn(el,delay,dur){
  setTimeout(()=>{el.setAttribute('opacity',0);
    const t0=performance.now();
    (function f(ts){const p=Math.min((ts-t0)/(dur||500),1);
      el.setAttribute('opacity',p);if(p<1)requestAnimationFrame(f);})(performance.now());
  },delay);
}

// ── Defs: gradients + filters ──────────────────────
const defs=mk('defs',{});

// Drop-shadow filter for bars
const fds=mk('filter',{id:'shadow',x:'-5%',y:'-20%',width:'110%',height:'160%'});
mk('feDropShadow',{dx:'0',dy:'4','stdDeviation':'6','flood-color':'rgba(0,50,150,0.5)','flood-opacity':'1'},fds);
defs.appendChild(fds);

// Glow filter
const fg=mk('filter',{id:'glow',x:'-30%',y:'-80%',width:'160%',height:'260%'});
mk('feGaussianBlur',{stdDeviation:'4',result:'b'},fg);
const fgm=mk('feMerge',{},fg);mk('feMergeNode',{in:'b'},fgm);mk('feMergeNode',{in:'SourceGraphic'},fgm);
defs.appendChild(fg);

// ── LAYOUT ─────────────────────────────────────────
const X0=195, X1=1255, TOTAL_DAYS=120;
const PPD=(X1-X0)/TOTAL_DAYS;   // 8.833 px/day
const TEST_DAY=106;
const TX=X0+TEST_DAY*PPD;
const BH=50, BR=10;

// sklearn TimeSeriesSplit(n_splits=3,gap=1) on 106 rows → test_size=26
const FOLDS=[
  {train:26,gap:1,val:26},
  {train:52,gap:1,val:26},
  {train:78,gap:1,val:26},
];
const Y_RULER=158;
const Y_ROWS=[258,373,488];

// ── BLUE PALETTE ────────────────────────────────────
// Three clearly distinct shades of blue
const B={
  // deep navy-blue  (training)
  train0:'#1a3a6e', train1:'#2563eb',
  // sky-blue        (validation)
  val0:  '#0e4f7a', val1:  '#38bdf8',
  // cyan-blue       (test)
  test0: '#064e5e', test1: '#06b6d4',
  // muted slate-blue (gap)
  gap:   'rgba(100,140,210,0.55)',
  // text/UI
  textHi:'rgba(220,235,255,0.95)',
  textMd:'rgba(140,170,215,0.80)',
  textLo:'rgba(80,120,180,0.65)',
  // bar background
  dimFill:'rgba(30,55,120,0.12)',
  dimStr: 'rgba(50,90,180,0.15)',
  // ruler
  rule:  'rgba(60,110,200,0.30)',
};

// Gradients (userSpaceOnUse so they don't shift when bar grows)
function mkGrad(id,x1,x2,c0,c1,op0,op1){
  const g=mk('linearGradient',{id,x1,y1:'0',x2,y2:'0',gradientUnits:'userSpaceOnUse'},defs);
  mk('stop',{offset:'0%','stop-color':c0,'stop-opacity':op0??'0.82'},g);
  mk('stop',{offset:'100%','stop-color':c1,'stop-opacity':op1??'0.95'},g);
  return g;
}
// We create per-fold per-segment gradients at fixed x coords
FOLDS.forEach((fold,fi)=>{
  const tw=fold.train*PPD, vx=X0+tw+fold.gap*PPD, vw=fold.val*PPD;
  mkGrad(`gTrain${fi}`, X0, X0+tw, B.train0, B.train1);
  mkGrad(`gVal${fi}`,   vx, vx+vw, B.val0,   B.val1);
});
mkGrad('gTest', TX, X1, B.test0, B.test1);

// ── GROUPS ─────────────────────────────────────────
const gBg    =mk('g',{opacity:0});
const gBars  =mk('g',{opacity:0});
const gLabels=mk('g',{opacity:0});
const gAnnot =mk('g',{opacity:0});
const gCards =mk('g',{opacity:0});
[gBg,gBars,gLabels,gAnnot,gCards].forEach(g=>sv.appendChild(g));

// ── BACKGROUND: grid + subtle noise lines ───────────
for(let i=0;i<=TOTAL_DAYS;i+=10){
  mk('line',{x1:X0+i*PPD,y1:108,x2:X0+i*PPD,y2:Y_ROWS[2]+BH+60,
    stroke:'rgba(40,80,180,0.06)','stroke-width':'1'},gBg);
}
// horizontal reference lines at each fold row
Y_ROWS.forEach(y=>{
  mk('line',{x1:X0-35,y1:y+BH/2,x2:X1,y2:y+BH/2,
    stroke:'rgba(40,80,180,0.06)','stroke-width':'1'},gBg);
});

// ── TITLE ──────────────────────────────────────────
tx('Walk-Forward Cross-Validation',{
  x:700,y:52,'text-anchor':'middle',
  'font-family':'Inter,sans-serif','font-size':'28','font-weight':'700',
  fill:B.textHi},gLabels);
tx('Expanding window  ·  3 folds  ·  1-day gap  ·  14-day held-out test',{
  x:700,y:80,'text-anchor':'middle',
  'font-family':'Inter,sans-serif','font-size':'13','font-weight':'300',
  'letter-spacing':'0.5',fill:B.textLo},gLabels);

// ── RULER ──────────────────────────────────────────
mk('line',{x1:X0,y1:Y_RULER,x2:X1,y2:Y_RULER,
  stroke:B.rule,'stroke-width':'1.5'},gBg);

// month dots + labels
[{l:'Jul',d:0},{l:'Aug',d:27},{l:'Sep',d:58},{l:'Oct',d:88},{l:'Nov',d:119}]
.forEach(m=>{
  const x=X0+m.d*PPD;
  mk('circle',{cx:x,cy:Y_RULER,r:3,fill:B.rule,filter:'url(#glow)'},gBg);
  tx(m.l,{x,y:Y_RULER-14,'text-anchor':'middle',
    'font-family':'Inter,sans-serif','font-size':'12','font-weight':'400',
    fill:B.textLo},gBg);
});

// test boundary dashed line
mk('line',{x1:TX,y1:Y_RULER+12,x2:TX,y2:Y_ROWS[2]+BH+12,
  stroke:B.test1,'stroke-opacity':'0.25','stroke-width':'1.2',
  'stroke-dasharray':'5 4'},gBg);

// ── FOLD ROWS ──────────────────────────────────────
const allTestLbls=[];

FOLDS.forEach((fold,fi)=>{
  const y=Y_ROWS[fi];
  const tw=fold.train*PPD;
  const gapW=fold.gap*PPD;
  const vx=X0+tw+gapW;
  const vw=fold.val*PPD;

  // ── Fold number label
  tx(`${fi+1}`,{x:X0-22,y:y+BH/2+5,'text-anchor':'middle',
    'font-family':'Inter,sans-serif','font-size':'11','font-weight':'600',
    fill:B.textLo},gLabels);
  // small circle behind number
  mk('circle',{cx:X0-22,cy:y+BH/2,r:12,fill:'rgba(30,60,140,0.35)',
    stroke:'rgba(60,100,200,0.25)','stroke-width':'1'},gBars);

  // ── Dim background (CV region)
  mk('rect',{x:X0,y,width:TX-X0,height:BH,rx:BR,
    fill:B.dimFill,stroke:B.dimStr,'stroke-width':'1'},gBars);

  // ── Test bar (always at end, always visible)
  mk('rect',{x:TX,y,width:X1-TX,height:BH,rx:BR,
    fill:`url(#gTest)`,filter:'url(#shadow)'},gBars);
  // top highlight line on test
  mk('line',{x1:TX+BR,y1:y+1.5,x2:X1-2,y2:y+1.5,
    stroke:'rgba(150,240,255,0.30)','stroke-width':'1.5',
    'stroke-linecap':'round'},gBars);

  // ── Test label
  const tl=tx('TEST',{x:TX+(X1-TX)/2,y:y+BH/2+5,'text-anchor':'middle',
    'font-family':'Inter,sans-serif','font-size':'10.5','font-weight':'700',
    'letter-spacing':'0.8',fill:'rgba(200,250,255,0.90)',opacity:0},gLabels);
  allTestLbls.push(tl);

  // ── Train bar (animated width)
  const trainBar=mk('rect',{x:X0,y,width:0,height:BH,rx:BR,
    fill:`url(#gTrain${fi})`,filter:'url(#shadow)'},gBars);
  // top highlight
  const trainHL=mk('line',{x1:X0+BR,y1:y+1.5,x2:X0,y2:y+1.5,
    stroke:'rgba(150,200,255,0.28)','stroke-width':'1.5',
    'stroke-linecap':'round'},gBars);
  const trainLbl=tx('TRAIN',{x:X0+tw/2,y:y+BH/2+5,'text-anchor':'middle',
    'font-family':'Inter,sans-serif','font-size':'10.5','font-weight':'700',
    'letter-spacing':'0.8',fill:'rgba(200,225,255,0.88)',opacity:0},gLabels);

  // ── Gap indicator (thin pill between train and val)
  const gapBar=mk('rect',{x:X0+tw,y:y+BH*0.28,width:gapW,height:BH*0.44,rx:3,
    fill:B.gap,opacity:0},gBars);

  // ── Val bar (animated width)
  const valBar=mk('rect',{x:vx,y,width:0,height:BH,rx:BR,
    fill:`url(#gVal${fi})`,filter:'url(#shadow)'},gBars);
  const valHL=mk('line',{x1:vx+BR,y1:y+1.5,x2:vx,y2:y+1.5,
    stroke:'rgba(150,230,255,0.28)','stroke-width':'1.5',
    'stroke-linecap':'round'},gBars);
  const valLbl=tx('VAL',{x:vx+vw/2,y:y+BH/2+5,'text-anchor':'middle',
    'font-family':'Inter,sans-serif','font-size':'10.5','font-weight':'700',
    'letter-spacing':'0.8',fill:'rgba(200,245,255,0.88)',opacity:0},gLabels);

  // ── Animate
  const delay=500+fi*380;
  setTimeout(()=>{
    const t0=performance.now();
    (function f(ts){
      const p=eInOut(Math.min((ts-t0)/620,1));
      const w=tw*p;
      trainBar.setAttribute('width',w);
      trainHL.setAttribute('x2',X0+Math.max(w-2,BR));
      if(w>55){trainLbl.setAttribute('x',X0+w/2);trainLbl.setAttribute('opacity','1');}
      if(p<1)requestAnimationFrame(f);
      else{
        gapBar.setAttribute('opacity','1');
        const t1=performance.now();
        (function g(ts2){
          const p2=eInOut(Math.min((ts2-t1)/420,1));
          const w2=vw*p2;
          valBar.setAttribute('width',w2);
          valHL.setAttribute('x2',vx+Math.max(w2-2,BR));
          if(w2>28){valLbl.setAttribute('opacity','1');}
          if(p2<1)requestAnimationFrame(g);
        })(performance.now());
      }
    })(performance.now());
  },delay);
});

// TEST labels after all bars done
const testLabelDelay=500+2*380+620+420+250;
allTestLbls.forEach(el=>fadeIn(el,testLabelDelay,300));

// ── ANNOTATIONS ────────────────────────────────────
// 1-day gap label (fold 3)
const f3=FOLDS[2], gapX3=X0+f3.train*PPD+f3.gap*PPD*0.5;
const aY=Y_ROWS[2]+BH+14;
mk('line',{x1:gapX3,y1:Y_ROWS[2]+BH+2,x2:gapX3,y2:aY+10,
  stroke:B.textLo,'stroke-width':'1','stroke-dasharray':'2 2'},gAnnot);
tx('gap  1d',{x:gapX3,y:aY+22,'text-anchor':'middle',
  'font-family':'Inter,sans-serif','font-size':'10.5','font-weight':'400',
  fill:B.textLo},gAnnot);

// Held-out test label (above ruler)
const tmx=TX+(X1-TX)/2;
mk('line',{x1:tmx,y1:Y_ROWS[0]-12,x2:tmx,y2:Y_RULER+12,
  stroke:B.test1,'stroke-opacity':'0.35','stroke-width':'1.2'},gAnnot);
tx('Held-out test',{x:tmx,y:Y_RULER-26,'text-anchor':'middle',
  'font-family':'Inter,sans-serif','font-size':'11','font-weight':'600',
  fill:B.test1,'fill-opacity':'0.90'},gAnnot);
tx('14 days — never touched during training',{x:tmx,y:Y_RULER-12,'text-anchor':'middle',
  'font-family':'Inter,sans-serif','font-size':'10','font-weight':'300',
  fill:B.test1,'fill-opacity':'0.55'},gAnnot);

// Expanding window bracket (left)
const bx=52, by0=Y_ROWS[0]+BH/2, by1=Y_ROWS[2]+BH/2;
[[bx+10,by0,bx,by0],[bx,by0,bx,by1],[bx,by1,bx+10,by1]].forEach(([x1,y1,x2,y2])=>{
  mk('line',{x1,y1,x2,y2,stroke:B.textLo,'stroke-width':'1.2'},gAnnot);
});
const bmy=(by0+by1)/2;
tx('expanding',{x:bx-14,y:bmy,'text-anchor':'middle','dominant-baseline':'middle',
  'font-family':'Inter,sans-serif','font-size':'10','font-weight':'400',
  fill:B.textLo,transform:`rotate(-90,${bx-14},${bmy})`},gAnnot);

// ── BOTTOM CARDS ───────────────────────────────────
const CY=608, CW=362, CH=128, CGX=[42,519,996];
const cardData=[
  {title:'Why walk-forward?',
   accent:B.train1,
   lines:['Standard k-fold shuffles data randomly,',
          'letting the model see the future. Walk-',
          'forward always trains on the past and',
          'evaluates on what comes next.']},
  {title:'Why expanding window?',
   accent:B.val1,
   lines:['Early campaign data stays informative',
          'close to election day. A sliding window',
          'discards that signal. We accumulate all',
          'history as new evidence arrives.']},
  {title:'Why a 1-day gap?',
   accent:B.test1,
   lines:['Rolling features at the fold boundary',
          'can leak info across the split. The gap',
          'mirrors the real task: observe day t-1,',
          'predict day t.']},
];

cardData.forEach((cd,i)=>{
  const cx=CGX[i];
  // glass card bg
  mk('rect',{x:cx,y:CY,width:CW,height:CH,rx:12,
    fill:'rgba(12,28,75,0.55)',stroke:'rgba(50,90,200,0.20)','stroke-width':'1'},gCards);
  // top accent bar
  mk('rect',{x:cx,y:CY,width:CW,height:3,rx:2,fill:cd.accent,'fill-opacity':'0.75'},gCards);
  // title
  tx(cd.title,{x:cx+18,y:CY+24,
    'font-family':'Inter,sans-serif','font-size':'12.5','font-weight':'600',
    fill:B.textHi},gCards);
  // lines
  cd.lines.forEach((line,li)=>{
    tx(line,{x:cx+18,y:CY+44+li*17.5,
      'font-family':'Inter,sans-serif','font-size':'11','font-weight':'300',
      fill:B.textMd},gCards);
  });
});

// ── LEGEND ─────────────────────────────────────────
const LY=554;
const leg=[
  {label:'Training',  fill:B.train1,op:'0.88'},
  {label:'Validation',fill:B.val1,  op:'0.88'},
  {label:'Test',      fill:B.test1, op:'0.88'},
  {label:'Gap',       fill:B.gap,   op:'1'},
];
const lw=leg.length*190, lx=(1400-lw)/2;
leg.forEach((l,i)=>{
  const x=lx+i*190;
  mk('rect',{x,y:LY-9,width:18,height:14,rx:4,fill:l.fill,'fill-opacity':l.op},gCards);
  tx(l.label,{x:x+26,y:LY+4,
    'font-family':'Inter,sans-serif','font-size':'12','font-weight':'400',
    fill:B.textMd},gCards);
});

// ── SEQUENCE ───────────────────────────────────────
fadeIn(gBg,150,600);
fadeIn(gLabels,300,500);
setTimeout(()=>gBars.setAttribute('opacity','1'),200);
const aDelay=testLabelDelay+300;
fadeIn(gAnnot,aDelay,500);
fadeIn(gCards,aDelay+200,600);
</script>
</body>
</html>
